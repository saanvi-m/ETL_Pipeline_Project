name: Daily ETL Run

on:
  schedule:
    # This weird string tells GitHub it must run at 8:00 AM every single day automatically!
    - cron: '0 8 * * *'  
  workflow_dispatch: # Allows you to also run it manually by clicking a button

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run ETL Script
        run: python main.py
